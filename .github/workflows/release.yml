name: Release Validation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run release gates
        run: |
          python tools/validate_engineering_system.py
          python tools/project_health.py --strict-release
      - name: Notice
        run: echo "Publishing is intentionally separate and requires owner-approved repository configuration."
