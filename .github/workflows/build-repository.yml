name: Build Kodi Repository

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "plugin.video.saile.mc/**"
      - "repository.saile/**"
      - "build_repo.py"
      - "tools/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate
        run: python tools/validate_engineering_system.py
      - name: Build when project tool exists
        run: |
          if [ -f build_repo.py ]; then
            python build_repo.py
          else
            echo "build_repo.py not present in this baseline package; skipping project build."
          fi
      - name: Inspect generated ZIP files
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile
          for path in Path('.').rglob('*.zip'):
              with zipfile.ZipFile(path) as z:
                  bad = z.testzip()
                  if bad:
                      raise SystemExit(f"Corrupt ZIP {path}: {bad}")
                  print(path, len(z.namelist()))
          PY
