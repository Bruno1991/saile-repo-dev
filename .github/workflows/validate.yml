name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate engineering system
        run: python tools/validate_engineering_system.py
      - name: Compile Python
        run: python -m compileall -q .
      - name: Parse XML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET
          for path in Path('.').rglob('*.xml'):
              if any(part in {'.git', '.venv', 'build', 'dist'} for part in path.parts):
                  continue
              ET.parse(path)
              print(path)
          PY
