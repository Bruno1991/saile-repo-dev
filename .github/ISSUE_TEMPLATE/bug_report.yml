name: Bug report
description: Relatar comportamento reproduzível do SAILE
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Kodi, sistema e dispositivo
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs sanitizados
      description: Remova usuário, senha, tokens e URLs autenticadas.
